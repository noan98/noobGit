<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>noobGit</title>
    <!-- 画面表示前にテーマを確定し、ライト→ダークのちらつきを防ぐ。
         保存値（noobgit-theme）と OS 設定から light/dark を解決して反映する。 -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem("noobgit-theme");
          var choice = c === "light" || c === "dark" ? c : "system";
          var dark =
            choice === "dark" ||
            (choice === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light",
          );
        } catch (e) {
          /* localStorage 不可などは既定（ライト）のまま */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
