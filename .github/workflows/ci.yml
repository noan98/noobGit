# CI: フロントエンド(TypeScript)と Rust(core/Tauri層) を検証する。
# Windows向けインストーラのビルドは release.yml 側で行う。
# アクションはコミットSHAで固定し、fmt は独立ジョブで高速に失敗させる。
# Cargoワークスペースはリポジトリ直下なので cargo は root から --workspace で回す。
name: ci

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - '.gitignore'

# 同一ブランチで新しいpushがあれば、進行中のCIはキャンセルする。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # PRの変更パスを判定し、フロント/Rustの重いジョブを必要なときだけ走らせる。
  # ci.yml 自体は（paths-ignore対象外なら）必ずトリガーされるので run は生成され、
  # 重いジョブがスキップでも run の結論は success になる。これにより automerge は
  # 「ci.yml が success」を確認でき、設定ファイルのみのPRでも自動マージが効く。
  changes:
    name: 変更パス判定
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      # pull_request イベントでは変更ファイルを API から取得するため checkout 不要。
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          # ci.yml 自身の変更は両方を回して新CI設定を検証する。
          filters: |
            frontend:
              - 'src/**'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - '.github/workflows/ci.yml'
            rust:
              - 'core/**'
              - 'src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.config/nextest.toml'
              - 'scripts/**'
              - '.github/workflows/ci.yml'

  frontend:
    name: frontend (typecheck + build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      # Rust enum バリアントと TypeScript 型リテラルの一致を静的に検証する。
      # src/api.ts だけ変更した場合でもここで乖離を検出できる。
      - name: Rust-TypeScript 型契約チェック
        run: python3 scripts/check_type_contract.py

      # Vitest によるユニットテストを実行する（ConfirmDialog / api ラッパーなど）。
      - name: フロントエンドユニットテスト
        run: npm run test

      # build は `tsc && vite build` なので型チェックを内包する。
      - name: Type-check and build
        run: npm run build

  rust-fmt:
    name: rust (fmt)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  rust:
    name: rust (check + clippy + test)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      # sccache をコンパイララッパーとして使い、コンパイル済みオブジェクトを
      # キャッシュする。依存クレートに変更がない場合の再コンパイルを大きく減らす。
      RUSTC_WRAPPER: sccache
      # sccache のキャッシュバックエンドに GitHub Actions キャッシュを使う
      # （sccache-action がこの環境変数を読んで GHA バックエンドを有効化する）。
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Tauri 2 を Linux でビルドするためのシステム依存（aptをキャッシュする）。
      - name: System deps (Tauri 2 prerequisites)
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev libxdo-dev libayatana-appindicator3-dev build-essential curl wget file libssl-dev
          version: noobgit-tauri-2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      # sccache 本体をインストールしサーバを起動する。env の RUSTC_WRAPPER=sccache と
      # SCCACHE_GHA_ENABLED=true により、コンパイラ出力レベルのキャッシュが効く。
      # 既存の Swatinem/rust-cache（registry/target のキャッシュ）と共存させる。
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # ルートにあるワークスペースの target をキャッシュ対象にする。
          workspaces: ". -> target"
          # ビルド失敗時もキャッシュを保存し、次回の再コンパイルを減らす。
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-nextest

      - name: Install frontend deps
        run: npm ci

      # src-tauri の `tauri::generate_context!` が frontendDist(../dist) を
      # 参照するため、Rustのビルド前にフロントエンドを用意しておく。
      - name: Build frontend (needed for tauri::generate_context!)
        run: npm run build

      # Tauriコマンド登録漏れをPythonスクリプトで検証する。
      # コンパイル前に実行して早期失敗させる。
      - name: Tauriコマンド登録漏れチェック
        run: python3 scripts/check_handlers.py

      # Rust enum バリアントと TypeScript 型リテラルの一致を静的に検証する。
      # core/ の型を変更した場合に api.ts との乖離を早期検出する。
      - name: Rust-TypeScript 型契約チェック
        run: python3 scripts/check_type_contract.py

      # clippy は rustc ドライバなので型チェック (cargo check 相当) を内包する。
      # 別途 cargo check を走らせると二重コンパイルになるため clippy に集約。
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo nextest run
        run: cargo nextest run --workspace --locked --all-targets --profile ci

      # sccache のキャッシュヒット率などの統計をジョブログに出力してモニタリングする。
      # ビルド失敗時も統計を確認できるよう always() で必ず実行する。
      - name: sccache 統計（キャッシュヒット率）
        if: always()
        run: sccache --show-stats

      - name: テスト結果をジョブサマリーに出力
        if: always()
        run: |
          if [ -f test-results/junit.xml ]; then
            python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os
          tree = ET.parse("test-results/junit.xml")
          root = tree.getroot()
          suite = root if root.tag == "testsuite" else root.find("testsuite") or root
          tests   = int(suite.get("tests",    0))
          fail    = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
          skipped = int(suite.get("skipped",  0))
          passed  = tests - fail - skipped
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("### テスト結果\n\n")
              f.write("| 結果 | 件数 |\n|---|---|\n")
              f.write(f"| ✅ 成功 | {passed} |\n")
              f.write(f"| ❌ 失敗 | {fail} |\n")
              f.write(f"| ⏭️ スキップ | {skipped} |\n")
              f.write(f"| 合計 | {tests} |\n")
          EOF
          fi

      - name: テスト結果レポートを公開
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v1
        if: always()
        with:
          name: Rust テスト結果
          path: "**/test-results/*.xml"
          reporter: java-junit
