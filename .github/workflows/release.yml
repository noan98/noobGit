# CD: バージョンタグ(v*)のpushで Windows用インストーラ(.exe/.msi)を
# ビルドし、GitHub Releaseに添付する。noobGitの対象はWindowsのため
# windows-latest でのみビルドする。アクションはコミットSHAで固定する。
name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# tauri-action がReleaseを作成・更新するために書き込み権限が要る。
permissions:
  contents: write

jobs:
  release:
    name: Build Windows installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install frontend deps
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'noobGit ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
